<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jirauta v2.0 - Bimodal AI Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* Mantenemos tus estilos originales e incluimos mejoras para el selector */
  :root {
    --bg: #0a0b0e; --surface: #111318; --surface2: #1a1d26;
    --border: #252830; --border2: #2e3240; --accent: #4f6ef7;
    --accent2: #7c5cfc; --success: #22d4a0; --warning: #f59e0b;
    --danger: #f43f5e; --text: #e8eaf2; --text2: #8b90a8;
    --text3: #555b72; --mono: 'DM Mono', monospace; --sans: 'Syne', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; }
  
  /* [ESTILOS DE PANTALLAS Y CARDS - IGUALES AL ORIGINAL] */
  #config-screen, #app-screen { display: flex; flex-direction: column; }
  #config-screen { align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; position: relative; overflow: hidden; }
  .config-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 580px; z-index: 1; }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; }
  .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .field { margin-bottom: 1.2rem; }
  .field label { display: block; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; color: var(--text2); margin-bottom: 0.4rem; font-family: var(--mono); }
  .field input, .field select { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 0.7rem 1rem; color: var(--text); font-family: var(--mono); font-size: 0.85rem; outline: none; }
  .btn-primary { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; border: none; border-radius: 8px; padding: 0.85rem; font-weight: 700; cursor: pointer; }
  
  /* CHAT AREA RE-STYLED */
  #app-screen { display: none; height: 100vh; flex-direction: row; }
  .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); padding: 1.5rem; display: flex; flex-direction: column; }
  .main { flex: 1; display: flex; flex-direction: column; }
  .chat-area { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1rem; }
  .input-area { padding: 1.5rem; border-top: 1px solid var(--border); }
  .input-box { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; background: var(--surface); padding: 0.8rem; border-radius: 12px; border: 1px solid var(--border2); }
  #chat-input { flex: 1; background: transparent; border: none; color: var(--text); outline: none; resize: none; font-family: var(--mono); }
  
  /* MESSAGES */
  .message { display: flex; gap: 1rem; max-width: 800px; margin: 0 auto; width: 100%; }
  .message.user { flex-direction: row-reverse; }
  .msg-bubble { padding: 1rem; border-radius: 12px; font-size: 0.9rem; line-height: 1.6; background: var(--surface); border: 1px solid var(--border); }
  .message.user .msg-bubble { background: var(--surface2); border-color: var(--accent); }
  .tag-model { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; background: var(--border2); margin-bottom: 4px; display: inline-block; }
</style>
</head>
<body>

<div id="config-screen">
  <div class="config-card">
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <div><h1>Jirauta v2.0</h1><span>Bimodal Intelligence Agent</span></div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
      <div class="field">
        <label>Jira Domain</label>
        <input id="jira-domain" type="text" placeholder="fcaruncho.atlassian.net" value="fcaruncho.atlassian.net">
      </div>
      <div class="field">
        <label>Project Key</label>
        <input id="jira-project" type="text" placeholder="SCRUM (opcional)">
      </div>
    </div>

    <div class="field">
      <label>Email</label>
      <input id="jira-email" type="email" value="fcaruncho@gmail.com">
    </div>

    <div class="field">
      <label>Jira API Token</label>
      <input id="jira-token" type="password" placeholder="ATATT...">
    </div>

    <div class="field">
      <label>Motor de IA (LLM)</label>
      <select id="llm-choice" onchange="toggleAiFields()">
        <option value="gemini">Google Gemini 1.5 Flash (Rápido)</option>
        <option value="claude">Anthropic Claude 3.5 Sonnet (Preciso)</option>
      </select>
    </div>

    <div id="field-gemini" class="field">
      <label>Gemini API Key</label>
      <input id="gemini-key" type="password" placeholder="AIzaSy...">
    </div>

    <div id="field-claude" class="field" style="display:none">
      <label>Anthropic API Key</label>
      <input id="anthropic-key" type="password" placeholder="sk-ant-...">
    </div>

    <button class="btn-primary" onclick="connect()">Inicializar Agente →</button>
  </div>
</div>

<div id="app-screen">
  <div class="sidebar">
    <h3 style="font-size: 0.8rem; color: var(--text3); margin-bottom: 1rem;">ACCIONES</h3>
    <button class="btn-primary" style="font-size: 0.7rem; margin-bottom: 1rem;" onclick="sendQuick('Crea una historia de usuario para un sistema de login con redes sociales')">✨ Crear Historia</button>
    <div id="status-area" style="font-size: 0.7rem; color: var(--text2); margin-top: auto;">
      🟢 <span id="active-model">Model: Gemini</span>
    </div>
  </div>

  <div class="main">
    <div class="chat-area" id="chat-area"></div>
    <div class="input-area">
      <div class="input-box">
        <textarea id="chat-input" rows="1" placeholder="Escribe aquí... (Ej: 'Crea un ticket para arreglar el bug de CSS en el header')"></textarea>
        <button class="btn-primary" style="width: 50px;" onclick="sendMessage()">↑</button>
      </div>
    </div>
  </div>
</div>

<script>
let config = {};
let history = [];
const CORS_PROXY = "https://corsproxy.io/?url=";

function toggleAiFields() {
  const choice = document.getElementById('llm-choice').value;
  document.getElementById('field-gemini').style.display = choice === 'gemini' ? 'block' : 'none';
  document.getElementById('field-claude').style.display = choice === 'claude' ? 'block' : 'none';
}

function connect() {
  config = {
    domain: document.getElementById('jira-domain').value,
    email: document.getElementById('jira-email').value,
    token: document.getElementById('jira-token').value,
    project: document.getElementById('jira-project').value.toUpperCase(),
    llm: document.getElementById('llm-choice').value,
    geminiKey: document.getElementById('gemini-key').value,
    claudeKey: document.getElementById('anthropic-key').value
  };
  document.getElementById('config-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'flex';
  document.getElementById('active-model').textContent = "Model: " + config.llm.toUpperCase();
}

async function jiraRequest(path, method = 'GET', body = null) {
  const credentials = btoa(`${config.email}:${config.token}`);
  const url = `https://${config.domain}${path}`;
  const options = {
    method: method,
    headers: {
      'Authorization': `Basic ${credentials}`,
      'Accept': 'application/json',
      'Content-Type': 'application/json',
      'X-Atlassian-Token': 'no-check'
    }
  };
  if (body) options.body = JSON.stringify(body);
  
  const res = await fetch(CORS_PROXY + encodeURIComponent(url), options);
  return res.json();
}

async function createJiraIssue(summary, description) {
  const body = {
    fields: {
      project: { key: config.project || "PROJ" },
      summary: summary,
      description: {
        type: "doc", version: 1,
        content: [{ type: "paragraph", content: [{ type: "text", text: description }] }]
      },
      issuetype: { name: "Story" }
    }
  };
  return await jiraRequest('/rest/api/3/issue', 'POST', body);
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  addMessage('user', text);
  input.value = '';

  // 1. Obtener contexto de Jira
  const jiraContext = await jiraRequest(`/rest/api/3/search?jql=order by created desc&maxResults=5`);
  const contextStr = JSON.stringify(jiraContext.issues?.map(i => ({key: i.key, summary: i.fields.summary})));

  const systemPrompt = `Eres Jirauta. Tienes acceso a Jira. 
  Contexto actual: ${contextStr}. 
  Si el usuario pide CREAR algo, responde confirmando y añade al final de tu respuesta exactamente: [CREATE_TICKET: Titulo | Descripcion]`;

  let responseText = "";
  
  try {
    if (config.llm === 'gemini') {
      responseText = await callGemini(systemPrompt, text);
    } else {
      responseText = await callClaude(systemPrompt, text);
    }

    // Lógica de "Plenos Poderes": Detectar si la IA quiere crear un ticket
    if (responseText.includes("[CREATE_TICKET:")) {
      const match = responseText.match(/\[CREATE_TICKET:\s*(.*?)\s*\|\s*(.*?)\]/);
      if (match) {
        const ticket = await createJiraIssue(match[1], match[2]);
        responseText += `\n\n✅ **Ticket creado exitosamente:** ${ticket.key}`;
      }
    }

    addMessage('assistant', responseText);
    history.push({role: 'user', content: text}, {role: 'assistant', content: responseText});
  } catch (e) {
    addMessage('assistant', "❌ Error: " + e.message);
  }
}

async function callGemini(system, userText) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${config.geminiKey}`;
  const res = await fetch(url, {
    method: 'POST',
    body: JSON.stringify({
      system_instruction: { parts: [{ text: system }] },
      contents: [{ role: 'user', parts: [{ text: userText }] }]
    })
  });
  const data = await res.json();
  return data.candidates[0].content.parts[0].text;
}

async function callClaude(system, userText) {
  // Nota: Claude requiere un proxy intermedio o server-side debido a CORS estricto.
  // Aquí usamos el mismo cors-proxy para propósitos educativos.
  const res = await fetch(CORS_PROXY + encodeURIComponent("https://api.anthropic.com/v1/messages"), {
    method: 'POST',
    headers: {
      'x-api-key': config.claudeKey,
      'anthropic-version': '2023-06-01',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: "claude-3-5-sonnet-20240620",
      max_tokens: 1024,
      system: system,
      messages: [{ role: "user", content: userText }]
    })
  });
  const data = await res.json();
  return data.content[0].text;
}

function addMessage(role, text) {
  const area = document.getElementById('chat-area');
  const msg = document.createElement('div');
  msg.className = `message ${role}`;
  msg.innerHTML = `<div class="msg-bubble">${text}</div>`;
  area.appendChild(msg);
  area.scrollTop = area.scrollHeight;
}

function sendQuick(t) { document.getElementById('chat-input').value = t; sendMessage(); }
</script>
</body>
</html>
